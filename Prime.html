<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<script>
    var num = Number(prompt("Enter the number:"));
    var isPrime=true;
    if(num<=1){
        isPrime=false;   
    }
    for(var i=2; i<=Math.sqrt(num); i++){
            if(num % i == 0){
                isPrime=false;
                break;
            }
    }
    if (isPrime) {
    console.log("Prime");
} else {
    console.log("Not Prime");
}
</script>
<body>
    <h3>Checking the given number is Prime or not</h3>
</body>
</html>
